<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1526"/><stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7ea8"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#54c6ff"/>
    </marker>
    <!-- line icons: 24x24 viewBox, drawn with currentColor stroke -->
    <g id="ic-warn"><path d="M12 3 L22 20 H2 Z" fill="none" stroke-width="1.8" stroke-linejoin="round"/><line x1="12" y1="9" x2="12" y2="14" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="17" r="0.9" fill="currentColor" stroke="none"/></g>
    <g id="ic-doc"><path d="M6 3 h8 l4 4 v14 h-12 Z" fill="none" stroke-width="1.8" stroke-linejoin="round"/><line x1="9" y1="12" x2="15" y2="12" stroke-width="1.6" stroke-linecap="round"/><line x1="9" y1="16" x2="15" y2="16" stroke-width="1.6" stroke-linecap="round"/></g>
    <g id="ic-stop"><circle cx="12" cy="12" r="9" fill="none" stroke-width="1.8"/><line x1="8" y1="8" x2="16" y2="16" stroke-width="1.8" stroke-linecap="round"/></g>
    <g id="ic-phone"><rect x="7" y="3" width="10" height="18" rx="2.5" fill="none" stroke-width="1.8"/><line x1="10.5" y1="18" x2="13.5" y2="18" stroke-width="1.6" stroke-linecap="round"/></g>
    <g id="ic-call"><path d="M6 4 h4 l2 5 -2.5 1.5 a11 11 0 0 0 5 5 L16 13 l5 2 v4 a2 2 0 0 1 -2 2 A16 16 0 0 1 4 6 a2 2 0 0 1 2 -2 Z" fill="none" stroke-width="1.6" stroke-linejoin="round"/></g>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <!-- ===== header ===== -->
  <g transform="translate(70,64)">
    <path d="M20 0 4 6v10c0 9 6 14.5 16 18 10-3.5 16-9 16-18V6L20 0Z" fill="#12233f" stroke="#54c6ff" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M10.5 15.5l3.8 3.8 7-7.6" fill="none" stroke="#54c6ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="52" y="18" fill="#eef2fc" font-size="32" font-weight="700">FraudShield — System Architecture</text>
    <text x="52" y="48" fill="#8a9cc2" font-size="17">Multimodal digital-arrest scam detection — verdict before the money moves</text>
  </g>

  <!-- ===== pipeline row (y = 190..380) ===== -->
  <!-- INPUT -->
  <g transform="translate(70,210)">
    <text x="0" y="-16" fill="#6b7ea8" font-size="14" letter-spacing="2">INPUT</text>
    <rect width="230" height="200" rx="16" fill="#141f38" stroke="#233457" stroke-width="1.4"/>
    <use href="#ic-call" x="26" y="30" width="22" height="22" color="#54c6ff"/>
    <text x="56" y="48" fill="#eef2fc" font-size="20" font-weight="700">Suspicious call</text>
    <text x="26" y="86" fill="#8a9cc2" font-size="16">Live call audio</text>
    <text x="26" y="112" fill="#8a9cc2" font-size="16">on the victim's phone</text>
    <text x="26" y="150" fill="#8a9cc2" font-size="16">— or —</text>
    <text x="26" y="178" fill="#54c6ff" font-size="16" font-weight="600">a pasted transcript</text>
  </g>

  <!-- L1 -->
  <g transform="translate(390,210)">
    <text x="0" y="-16" fill="#6b7ea8" font-size="14" letter-spacing="2">L1 · TRANSCRIPTION</text>
    <rect width="230" height="200" rx="16" fill="#141f38" stroke="#233457" stroke-width="1.4"/>
    <text x="26" y="48" fill="#eef2fc" font-size="20" font-weight="700">Whisper ASR</text>
    <text x="26" y="86" fill="#8a9cc2" font-size="16">Speech → text</text>
    <text x="26" y="112" fill="#8a9cc2" font-size="16">Hindi &amp; English</text>
    <text x="26" y="178" fill="#54c6ff" font-size="15" font-weight="600">Groq · whisper-large-v3</text>
  </g>

  <!-- L3 (top) -->
  <g transform="translate(710,120)">
    <text x="0" y="-16" fill="#6b7ea8" font-size="14" letter-spacing="2">L3 · SCRIPT UNDERSTANDING</text>
    <rect width="300" height="150" rx="16" fill="#141f38" stroke="#233457" stroke-width="1.4"/>
    <text x="26" y="46" fill="#eef2fc" font-size="20" font-weight="700">LLM + scam taxonomy</text>
    <text x="26" y="80" fill="#8a9cc2" font-size="16">Scam stage (0–5) &amp; red flags,</text>
    <text x="26" y="104" fill="#8a9cc2" font-size="16">via retrieval (RAG)</text>
    <text x="26" y="134" fill="#54c6ff" font-size="15" font-weight="600">Llama 3.3 70B</text>
  </g>

  <!-- L2 (bottom) -->
  <g transform="translate(710,320)">
    <text x="0" y="-16" fill="#6b7ea8" font-size="14" letter-spacing="2">L2 · VOICE AUTHENTICITY</text>
    <rect width="300" height="150" rx="16" fill="#141f38" stroke="#233457" stroke-width="1.4"/>
    <text x="26" y="46" fill="#eef2fc" font-size="20" font-weight="700">wav2vec2 detector</text>
    <text x="26" y="80" fill="#8a9cc2" font-size="16">P(AI-generated voice) —</text>
    <text x="26" y="104" fill="#8a9cc2" font-size="16">real vs synthetic speech</text>
    <text x="26" y="134" fill="#54c6ff" font-size="15" font-weight="600">fine-tuned model · AUC 1.0</text>
  </g>

  <!-- L4 -->
  <g transform="translate(1090,210)">
    <text x="0" y="-16" fill="#6b7ea8" font-size="14" letter-spacing="2">L4 · FUSION</text>
    <rect width="230" height="200" rx="16" fill="#132a45" stroke="#2c74b8" stroke-width="1.8"/>
    <text x="26" y="48" fill="#eef2fc" font-size="20" font-weight="700">Decision fusion</text>
    <text x="26" y="86" fill="#8a9cc2" font-size="16">Combines script</text>
    <text x="26" y="110" fill="#8a9cc2" font-size="16">+ voice signals</text>
    <text x="26" y="150" fill="#8a9cc2" font-size="15">Neither fires alone →</text>
    <text x="26" y="174" fill="#8a9cc2" font-size="15">near-zero false alarms</text>
  </g>

  <!-- flow arrows -->
  <g stroke-width="2.4" fill="none">
    <line x1="300" y1="310" x2="386" y2="310" stroke="#6b7ea8" marker-end="url(#arrow)"/>
    <path d="M620 300 C 670 300, 660 195, 706 195" stroke="#6b7ea8" marker-end="url(#arrow)"/>
    <path d="M620 320 C 670 320, 660 395, 706 395" stroke="#6b7ea8" marker-end="url(#arrow)"/>
    <path d="M1010 195 C 1055 195, 1050 280, 1086 280" stroke="#54c6ff" marker-end="url(#arrowB)"/>
    <path d="M1010 395 C 1055 395, 1050 340, 1086 340" stroke="#54c6ff" marker-end="url(#arrowB)"/>
  </g>

  <!-- verdict pills under L4 -->
  <g transform="translate(1090,440)">
    <rect width="230" height="44" rx="10" fill="#2a1622" stroke="#5a2438"/>
    <text x="115" y="29" text-anchor="middle" fill="#f5476b" font-size="16" font-weight="700">HIGH-RISK</text>
    <rect y="52" width="112" height="40" rx="10" fill="#221d10" stroke="#5a4a24"/>
    <text x="56" y="78" text-anchor="middle" fill="#f4b73c" font-size="14" font-weight="600">CAUTION</text>
    <rect x="120" y="52" width="110" height="40" rx="10" fill="#141f38" stroke="#233457"/>
    <text x="175" y="78" text-anchor="middle" fill="#8a9cc2" font-size="14" font-weight="600">ABSTAIN</text>
  </g>
  <line x1="1205" y1="410" x2="1205" y2="438" stroke="#54c6ff" stroke-width="2.4" marker-end="url(#arrowB)"/>

  <!-- ===== intervention band ===== -->
  <g transform="translate(70,580)">
    <text x="0" y="-16" fill="#6b7ea8" font-size="14" letter-spacing="2">ON HIGH-RISK — INTERVENTION BEFORE ANY FINANCIAL TRANSFER</text>
    <rect width="1250" height="150" rx="18" fill="#101a30" stroke="#233457" stroke-width="1.4"/>

    <g transform="translate(34,34)">
      <rect width="280" height="82" rx="12" fill="#1a1020" stroke="#5a2438"/>
      <use href="#ic-warn" x="22" y="20" width="24" height="24" color="#f5476b"/>
      <text x="56" y="38" fill="#f6c9d4" font-size="17" font-weight="700">Bilingual warning</text>
      <text x="22" y="64" fill="#8a9cc2" font-size="14">On the victim's screen (EN + हिंदी)</text>
    </g>
    <g transform="translate(344,34)">
      <rect width="280" height="82" rx="12" fill="#0e1830" stroke="#233457"/>
      <use href="#ic-doc" x="22" y="20" width="24" height="24" color="#54c6ff"/>
      <text x="56" y="38" fill="#eef2fc" font-size="17" font-weight="700">Auto-drafted report</text>
      <text x="22" y="64" fill="#8a9cc2" font-size="14">1930 / NCRB complaint + evidence</text>
    </g>
    <g transform="translate(654,34)">
      <rect width="280" height="82" rx="12" fill="#0e1830" stroke="#233457"/>
      <use href="#ic-stop" x="22" y="20" width="24" height="24" color="#f4b73c"/>
      <text x="56" y="38" fill="#eef2fc" font-size="17" font-weight="700">Guided action</text>
      <text x="22" y="64" fill="#8a9cc2" font-size="14">"Don't pay or share OTP · dial 1930"</text>
    </g>
    <g transform="translate(964,34)">
      <rect width="252" height="82" rx="12" fill="#0e1830" stroke="#233457"/>
      <use href="#ic-phone" x="22" y="20" width="24" height="24" color="#54c6ff"/>
      <text x="56" y="38" fill="#eef2fc" font-size="17" font-weight="700">On-device</text>
      <text x="22" y="64" fill="#8a9cc2" font-size="14">Consumer app · privacy-preserving</text>
    </g>
  </g>

  <!-- ===== validation footer ===== -->
  <g transform="translate(70,800)">
    <text x="0" y="-14" fill="#6b7ea8" font-size="14" letter-spacing="2">VALIDATED</text>
    <rect width="1250" height="62" rx="14" fill="#0e1830" stroke="#233457" stroke-width="1.4"/>
    <g transform="translate(30,0)" font-size="16">
      <text x="0" y="38" fill="#31d69f" font-weight="700" font-size="20">F1 1.00</text>
      <text x="95" y="38" fill="#8a9cc2">vs 0.60 keyword baseline</text>

      <text x="430" y="38" fill="#31d69f" font-weight="700" font-size="20">7 / 7</text>
      <text x="500" y="38" fill="#8a9cc2">real scam calls caught  ·  5/5 benign correct</text>

      <text x="860" y="38" fill="#54c6ff" font-weight="700" font-size="20">AUC 1.0</text>
      <text x="965" y="38" fill="#8a9cc2">voice deepfake · 0 false positives</text>
    </g>
  </g>
</svg>
